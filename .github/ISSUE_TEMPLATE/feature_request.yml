name: Feature Request
description: Suggest a new feature or enhancement for Gogs
labels: ["kind/feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature!
        Please fill out this form as completely as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting a feature request.
      options:
        - label: I have searched the [existing issues](https://github.com/gogs/gogs/issues) and this feature has not been requested before.
          required: true
        - label: I have checked the [roadmap](https://github.com/gogs/gogs/issues?q=is%3Aopen+is%3Aissue+label%3Akind%2Fenhancement) and this feature is not already planned.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: importance
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use of Gogs
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples about the feature request here.
    validations:
      required: false
